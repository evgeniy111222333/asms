apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: '15s'
      queryTimeout: '60s'
      httpMethod: POST

  - name: PostgreSQL
    type: postgres
    url: postgres:5432
    database: acms
    user: acms
    secureJsonData:
      password: acms
    jsonData:
      sslmode: disable
      maxOpenConns: 5
      maxIdleConns: 2
      connMaxLifetime: 14400
      postgresVersion: 1600

  - name: Redis
    type: redis-datasource
    url: redis://redis:6379
    isDefault: false
    editable: true
